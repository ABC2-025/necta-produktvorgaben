<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Produktvorgaben &middot; Necta</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:13px;background:#f0f4f8;color:#1a2332}
.topbar{background:#1F4E79;color:#fff;padding:9px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.topbar h1{font-size:14px;font-weight:700;white-space:nowrap}
.tb-sep{width:1px;height:22px;background:rgba(255,255,255,.25);flex-shrink:0}
.sw{flex:1;min-width:140px;max-width:260px}
.sw input{width:100%;padding:5px 10px;border-radius:5px;border:none;font-size:12px;outline:none}
.view-btns{display:flex;gap:3px}
.vbtn{padding:4px 12px;border-radius:5px;border:1.5px solid rgba(255,255,255,.4);background:transparent;color:#fff;font-size:11px;font-weight:700;cursor:pointer}
.vbtn:hover{background:rgba(255,255,255,.15)}.vbtn.active{background:#fff;color:#1F4E79}
.filter-strip{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.fbtn{padding:3px 10px;border-radius:4px;border:1.5px solid rgba(255,255,255,.35);background:transparent;color:#fff;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.fbtn:hover{background:rgba(255,255,255,.15)}.fbtn.active{background:#fff;color:#1F4E79;border-color:#fff}
.chk-lbl{display:flex;align-items:center;gap:3px;font-size:11px;cursor:pointer;background:rgba(255,255,255,.1);border-radius:4px;padding:3px 8px;border:1px solid rgba(255,255,255,.2);white-space:nowrap}
.chk-lbl:hover{background:rgba(255,255,255,.2)}
.xls-btn{padding:4px 12px;border-radius:5px;border:none;background:#28a745;color:#fff;font-size:11px;font-weight:700;cursor:pointer}
.xls-btn:hover{background:#218838}
.sync-indicator{font-size:10px;opacity:.85;display:flex;align-items:center;gap:4px;white-space:nowrap}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#6fcf6f;flex-shrink:0}
.sync-dot.saving{background:#ffc107;animation:pulse .6s infinite}
.sync-dot.error{background:#ff6b6b}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.95);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.loading-overlay h2{color:#1F4E79;font-size:16px}
.loading-overlay p{color:#607080;font-size:13px}
.spinner{width:36px;height:36px;border:3px solid #dbe4ee;border-top-color:#2E75B6;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.container{padding:12px 16px;max-width:1700px;margin:0 auto}
#view-dashboard{display:none}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.dash-card{background:#fff;border-radius:10px;padding:16px 18px;border:1px solid #dbe4ee;cursor:pointer;transition:box-shadow .15s}
.dash-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.12)}
.dc-val{font-size:32px;font-weight:700;color:#1F4E79;line-height:1}
.dc-lbl{font-size:12px;color:#607080;margin-top:4px}
.dc-sub{font-size:11px;color:#8a9ab0;margin-top:2px}
.progress-section{background:#fff;border-radius:10px;padding:16px 18px;border:1px solid #dbe4ee;margin-bottom:16px}
.progress-section h3{font-size:13px;font-weight:700;color:#1F4E79;margin-bottom:12px}
.prog-row{margin-bottom:10px}
.prog-lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.prog-bg{background:#f0f4f8;border-radius:4px;height:10px;overflow:hidden;display:flex}
.fill-def{background:#28a745}.fill-ges{background:#dc3545}.fill-off{background:#ffc107}
.kat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dash-legend{display:flex;gap:16px;margin-bottom:14px;font-size:11px}
.dash-legend span{display:flex;align-items:center;gap:5px}
.dot{width:10px;height:10px;border-radius:2px}
#view-table{display:block}
.scards{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:7px;margin-bottom:10px}
.sc{background:#fff;border-radius:7px;padding:8px 12px;border:1px solid #dbe4ee}
.sc .lbl{font-size:10px;color:#607080}.sc .val{font-size:17px;font-weight:700;color:#1F4E79}.sc .sub{font-size:10px;color:#8a9ab0}
.group-block{background:#fff;border-radius:8px;margin-bottom:6px;border:1px solid #dbe4ee;overflow:hidden}
.gh{display:flex;align-items:center;gap:8px;padding:9px 14px;background:#2E75B6;color:#fff;cursor:pointer;user-select:none}
.gh:hover{background:#1a5c99}
.gt{font-size:10px;transition:transform .2s;display:inline-block;width:10px;flex-shrink:0}
.gt.open{transform:rotate(90deg)}
.gname{font-weight:700;font-size:12px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gbadge{background:rgba(255,255,255,.25);border-radius:3px;padding:1px 7px;font-size:10px;font-weight:700;flex-shrink:0}
.g-pills{display:flex;gap:4px;flex-shrink:0}
.gp{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:700}
.gp-o{background:rgba(255,193,7,.35);color:#fff}.gp-d{background:rgba(40,167,69,.45);color:#fff}.gp-g{background:rgba(220,53,69,.45);color:#fff}
.gmeta{font-size:11px;opacity:.8;white-space:nowrap;flex-shrink:0}
.gb{display:none;overflow-x:auto}.gb.open{display:block}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:1050px}
thead th{background:#EBF3FB;font-size:10px;font-weight:700;color:#1F4E79;padding:5px 6px;border-bottom:2px solid #B8CCE4;white-space:nowrap;text-align:left}
thead th.r{text-align:right}thead th.c{text-align:center}
thead th.s{cursor:pointer}thead th.s:hover{background:#D6E8F8}thead th.sorted{background:#C2D9F0}
.sa{font-size:8px;margin-left:1px;opacity:.6}
.csep{border-left:2px solid #B8CCE4}
tbody tr{border-bottom:1px solid #f0f4f8}
tbody tr:last-child{border-bottom:none}
tbody tr:hover td{background:#f2f7ff !important}
tbody tr.row-definiert td{background:#edfbf1 !important}
tbody tr.row-gesperrt td{background:#f4f4f4 !important}
tbody tr.row-gesperrt .art-name{color:#aaa}
tbody tr.row-gesperrt .pill:not(.gesperrt){opacity:0.5}
td{padding:4px 6px;vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
td.r{text-align:right;font-variant-numeric:tabular-nums}td.c{text-align:center}
.pill{display:inline-block;font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;white-space:nowrap}
.pill.offen{background:#fff3cd;color:#856404}.pill.definiert{background:#d4edda;color:#155724}.pill.gesperrt{background:#f8d7da;color:#721c24}
.pill.ja{background:#c3e6cb;color:#155724}.pill.nein{background:#f5c6cb;color:#721c24}.pill.nv{background:#e9ecef;color:#666}
.pct{font-size:10px;padding:1px 4px;border-radius:3px;font-weight:700}
.pct.pos{background:#fde8e8;color:#a00}.pct.neg{background:#e8f5e9;color:#1a6b1a}
.no-res{text-align:center;padding:40px;color:#607080}
.sel-bar{background:#0D3352;color:#fff;padding:7px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-height:38px;border-bottom:2px solid #2E75B6}
.sel-bar-info{font-size:12px;font-weight:700;flex:1}
.sel-bar-info span{opacity:.7;font-weight:400;margin-left:6px;font-size:11px}
.sel-actions{display:flex;gap:6px;align-items:center}
.sel-label{font-size:11px;opacity:.7}
.sel-status-btn{padding:3px 10px;border-radius:4px;border:1.5px solid rgba(255,255,255,.4);background:transparent;color:#fff;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.sel-status-btn:hover{background:rgba(255,255,255,.15)}
.sel-status-btn.s-offen{border-color:#ffc107;color:#ffc107}
.sel-status-btn.s-definiert{border-color:#6fcf6f;color:#6fcf6f}
.sel-status-btn.s-gesperrt{border-color:#ff8080;color:#ff8080}
.sel-clear{padding:3px 10px;border-radius:4px;border:1.5px solid rgba(255,255,255,.3);background:transparent;color:#fff;font-size:11px;cursor:pointer}
.sel-clear:hover{background:rgba(255,255,255,.1)}
.row-chk{width:14px;height:14px;cursor:pointer;accent-color:#2E75B6}
.chk-cell{width:30px;text-align:center}
tbody tr.row-selected td{outline:2px solid #2E75B6;outline-offset:-1px}
.edit-btn{background:#EBF3FB;border:1px solid #B8CCE4;border-radius:4px;cursor:pointer;color:#1F4E79;font-size:10px;padding:2px 8px;white-space:nowrap;font-weight:700}
.edit-btn:hover{background:#d0e4f7}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;overflow-y:auto;padding:40px 16px}
.modal-bg.open{display:block}
.modal{background:#fff;border-radius:12px;width:980px;max-width:98vw;margin:0 auto;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.mh{background:#1F4E79;color:#fff;padding:14px 20px;border-radius:12px 12px 0 0;display:flex;align-items:center;gap:12px}
.mh h2{font-size:14px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0}
.mh-close{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:5px;padding:4px 12px;cursor:pointer;font-size:12px;font-weight:700;flex-shrink:0}
.mh-close:hover{background:rgba(255,255,255,.35)}
.modal-layout{display:flex}
.modal-left{width:280px;flex-shrink:0;background:#f7fafd;border-right:1px solid #dbe4ee;padding:16px;border-radius:0 0 0 12px;overflow-y:auto;max-height:70vh}
.modal-right{flex:1;padding:18px 20px;overflow-y:auto;max-height:70vh}
.stat-sect{font-size:11px;font-weight:700;color:#1F4E79;margin-bottom:8px;padding-bottom:4px;border-bottom:1.5px solid #dbe4ee}
.stat-box{background:#fff;border:1px solid #dbe4ee;border-radius:6px;padding:8px 10px;margin-bottom:6px}
.stat-box.highlight{border-color:#2E75B6;background:#EBF3FB}
.sb-lbl{font-size:10px;color:#607080;margin-bottom:1px}
.sb-val{font-size:15px;font-weight:700;color:#1F4E79}
.pct-big{font-size:24px;font-weight:700;text-align:center;padding:10px;margin-top:6px}
.pct-lbl{font-size:10px;color:#607080;margin-top:2px;font-weight:400}
.stat-id{font-size:10px;color:#aaa;margin-top:8px}
.ms-title{font-size:11px;font-weight:700;color:#1F4E79;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fi{display:flex;flex-direction:column;gap:3px}
.fi label{font-size:10px;font-weight:700;color:#607080}
.fi input,.fi select,.fi textarea{padding:5px 8px;border:1px solid #c8d8e8;border-radius:5px;font-size:12px;font-family:inherit;color:#1a2332;background:#fff}
.fi input:focus,.fi select:focus,.fi textarea:focus{outline:none;border-color:#2E75B6;box-shadow:0 0 0 2px rgba(46,117,182,.15)}
.fi textarea{resize:vertical;min-height:60px}
.fi.full{grid-column:1/-1}
.mf{padding:12px 20px;border-top:1px solid #f0f4f8;display:flex;align-items:center;gap:8px}
.mf-nav{font-size:11px;color:#607080;flex:1}
.btn-save{padding:7px 18px;background:#1F4E79;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer}
.btn-save:hover{background:#2E75B6}
.btn-next{padding:7px 18px;background:#2E75B6;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer}
.btn-next:hover{background:#1F4E79}
.btn-cancel{padding:7px 14px;background:#f0f4f8;color:#1a2332;border:1px solid #c8d8e8;border-radius:6px;font-size:12px;cursor:pointer}
.btn-cancel:hover{background:#e2eaf2}
</style>
</head>
<body>
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <h2>Daten werden geladen...</h2>
  <p id="loading-msg">Verbindung zu Supabase...</p>
</div>

<div class="topbar">
  <h1>Produktvorgaben &middot; Necta</h1>
  <div class="tb-sep"></div>
  <div class="view-btns">
    <button class="vbtn active" id="btn-table" onclick="switchView('table')">Tabelle</button>
    <button class="vbtn" id="btn-dash" onclick="switchView('dashboard')">Dashboard</button>
  </div>
  <div class="tb-sep"></div>
  <div class="sw"><input id="search" placeholder="Artikel suchen..." oninput="render()"></div>
  <div class="filter-strip">
    <button class="fbtn active" id="fs-all" onclick="setStatus('all')">Alle</button>
    <button class="fbtn" id="fs-offen" onclick="setStatus('offen')">Offen</button>
    <button class="fbtn" id="fs-definiert" onclick="setStatus('definiert')">Definiert</button>
    <button class="fbtn" id="fs-gesperrt" onclick="setStatus('gesperrt')">Gesperrt</button>
  </div>
  <div class="filter-strip">
    <label class="chk-lbl"><input type="checkbox" id="f-bio" onchange="render()"> Bio-Pfl.</label>
    <label class="chk-lbl"><input type="checkbox" id="f-vegan" onchange="render()"> Vegan-Pfl.</label>
    <label class="chk-lbl"><input type="checkbox" id="f-veg" onchange="render()"> Veg.-Pfl.</label>
    <label class="chk-lbl"><input type="checkbox" id="f-gluten" onchange="render()"> Glutenfrei-Pfl.</label>
    <label class="chk-lbl"><input type="checkbox" id="f-pairs" onchange="render()"> Bio+Konv-Paare</label>
    <label class="chk-lbl"><input type="checkbox" id="f-no2025" onchange="render()"> Nicht eingekauft 2025</label>
  </div>
  <div class="tb-sep"></div>
  <div class="sync-indicator"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">Verbinden...</span></div>
  <button class="xls-btn" onclick="exportExcel()">&#8595; Excel Export</button>
</div>

<div class="sel-bar" id="sel-bar" style="display:none">
  <div class="sel-bar-info" id="sel-info">0 Artikel ausgewählt</div>
  <div class="sel-actions">
    <span class="sel-label">Status setzen:</span>
    <button class="sel-status-btn s-offen" onclick="bulkSetStatus('offen')">Offen</button>
    <button class="sel-status-btn s-definiert" onclick="bulkSetStatus('definiert')">Definiert</button>
    <button class="sel-status-btn s-gesperrt" onclick="bulkSetStatus('gesperrt')">Gesperrt</button>
    <button class="sel-clear" onclick="clearSelection()">&#10005; Auswahl l&ouml;schen</button>
  </div>
</div>
<div class="container">
  <div id="view-dashboard">
    <div class="dash-grid" id="dash-cards"></div>
    <div class="progress-section">
      <h3>Bearbeitungsstand je Kategorie</h3>
      <div class="dash-legend">
        <span><span class="dot" style="background:#28a745"></span>Definiert</span>
        <span><span class="dot" style="background:#dc3545"></span>Gesperrt</span>
        <span><span class="dot" style="background:#ffc107"></span>Offen</span>
      </div>
      <div class="kat-grid" id="kat-prog"></div>
    </div>
  </div>
  <div id="view-table">
    <div class="scards" id="scards"></div>
    <div id="gc"></div>
    <div class="no-res" id="no-res" style="display:none">Keine Ergebnisse.</div>
  </div>
</div>

<div class="modal-bg" id="mbg">
  <div class="modal">
    <div class="mh">
      <h2 id="m-title"></h2>
      <button class="mh-close" onclick="closeModal()">&#10005; Schlie&szlig;en</button>
    </div>
    <div class="modal-layout">
      <div class="modal-left" id="m-stats"></div>
      <div class="modal-right">
        <div class="ms-title">Vorgaben bearbeiten</div>
        <div class="fg">
          <div class="fi"><label>Status</label>
            <select id="e-status"><option value="offen">Offen</option><option value="definiert">Definiert</option><option value="gesperrt">Gesperrt</option></select></div>
          <div class="fi"><label>Kiosk</label>
            <select id="e-kiosk"><option value="Ja">Ja</option><option value="Nein">Nein</option></select></div>
          <div class="fi"><label>Bio-Pflicht</label>
            <select id="e-bio"><option value="keine Vorgabe">Keine Vorgabe</option><option value="Ja">Ja</option><option value="Nein">Nein</option></select></div>
          <div class="fi"><label>Vegan-Pflicht</label>
            <select id="e-vegan"><option value="keine Vorgabe">Keine Vorgabe</option><option value="Ja">Ja</option><option value="Nein">Nein</option></select></div>
          <div class="fi"><label>Vegetarisch-Pflicht</label>
            <select id="e-veg"><option value="keine Vorgabe">Keine Vorgabe</option><option value="Ja">Ja</option><option value="Nein">Nein</option></select></div>
          <div class="fi"><label>Glutenfrei-Pflicht</label>
            <select id="e-gluten"><option value="keine Vorgabe">Keine Vorgabe</option><option value="Ja">Ja</option><option value="Nein">Nein</option></select></div>
          <div class="fi"><label>Mindest-MHD (Tage)</label>
            <input type="number" id="e-mhd" placeholder="z.B. 5"></div>
          <div class="fi"><label>Gebinde- / Gr&ouml;&szlig;envorgabe</label>
            <input type="text" id="e-groesse" placeholder="z.B. 500g Gebinde"></div>
          <div class="fi"><label>Verpackungsvorgabe</label>
            <input type="text" id="e-verpackung" placeholder="z.B. Karton"></div>
          <div class="fi"><label>Zertifizierung / Label</label>
            <input type="text" id="e-zert" placeholder="z.B. MSC, Bio"></div>
          <div class="fi"><label>Regionale Herkunft</label>
            <input type="text" id="e-herkunft" placeholder="z.B. Regional DE"></div>
          <div class="fi"><label>Bevorzugter Hersteller</label>
            <input type="text" id="e-bev" placeholder="Lieferant"></div>
          <div class="fi"><label>Ausschluss Hersteller</label>
            <input type="text" id="e-aus" placeholder="Ausgeschlossen"></div>
          <div class="fi full"><label>Anforderungen / Bemerkungen</label>
            <textarea id="e-bem" placeholder="Freitext..."></textarea></div>
        </div>
      </div>
    </div>
    <div class="mf">
      <span class="mf-nav" id="m-nav"></span>
      <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-save" onclick="saveModal()">&#10003; Speichern</button>
      <button class="btn-next" onclick="saveAndNext()">Speichern &amp; N&auml;chster &#8594;</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

async function sbFetch(path, method, body, prefer) {
  const headers = {
    'apikey': SUPA_KEY,
    'Authorization': 'Bearer ' + SUPA_KEY,
    'Content-Type': 'application/json'
  };
  if (prefer) headers['Prefer'] = prefer;
  const res = await fetch(SUPA_URL + '/rest/v1/' + path, {
    method: method || 'GET',
    headers: headers,
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  return res.status === 204 ? null : res.json();
}

async function dbLoadAll() {
  let all = [], from = 0;
  while (true) {
    const to = from + 499;
    const res = await fetch(SUPA_URL + '/rest/v1/produktvorgaben?select=*&order=kategorie,name', {
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + SUPA_KEY,
        'Range': from + '-' + to,
        'Range-Unit': 'items'
      }
    });
    if (!res.ok) throw new Error(await res.text());
    const batch = await res.json();
    if (!batch || !batch.length) break;
    all = all.concat(batch);
    if (batch.length < 500) break;
    from += 500;
  }
  return all;
}

async function dbUpdate(id, data) {
  return sbFetch('produktvorgaben?id=eq.' + id, 'PATCH', data, 'return=minimal');
}

function fmt(n, d) {
  if (n == null || isNaN(n)) return '\u2013';
  return Number(n).toLocaleString('de-DE', {minimumFractionDigits: d||0, maximumFractionDigits: d||0});
}
function fmtE(n) {
  if (n == null || isNaN(n) || n === 0) return '\u2013';
  return fmt(n, 2) + '\u00a0\u20ac';
}
function nv(v) { return v == null || v === '' || v === 'None' || String(v) === 'null'; }

function setSyncStatus(state, label) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot' + (state === 'saving' ? ' saving' : state === 'error' ? ' error' : '');
  lbl.textContent = label;
}

async function init() {
  setMsg('Lade Daten...');
  try {
    const rows = await dbLoadAll();
    if (!rows || rows.length === 0) {
      setMsg('Keine Daten. Bitte SQL-Import durchf\u00fchren.');
      setSyncStatus('error', 'Keine Daten');
      return;
    }
    buildFromRows(rows);
    document.getElementById('loading').style.display = 'none';
    setSyncStatus('ok', rows.length + ' Artikel geladen');
    render();
    startRealtime();
  } catch(e) {
    setMsg('Fehler: ' + e.message);
    setSyncStatus('error', 'Fehler');
    console.error(e);
  }
}

function startRealtime() {
  const ws_url = SUPA_URL.replace('https://', 'wss://') + '/realtime/v1/websocket?apikey=' + SUPA_KEY + '&vsn=1.0.0';
  let ws, retryTimeout;

  function connect() {
    ws = new WebSocket(ws_url);

    ws.onopen = function() {
      setSyncStatus('ok', 'Echtzeit aktiv');
      // Join the realtime channel for our table
      ws.send(JSON.stringify({
        topic: 'realtime:public:produktvorgaben',
        event: 'phx_join',
        payload: { config: { broadcast: { self: false }, presence: { key: '' }, postgres_changes: [{ event: '*', schema: 'public', table: 'produktvorgaben' }] } },
        ref: '1'
      }));
      // Heartbeat every 30s
      setInterval(function() {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ topic: 'phoenix', event: 'heartbeat', payload: {}, ref: '0' }));
        }
      }, 30000);
    };

    ws.onmessage = function(e) {
      try {
        const msg = JSON.parse(e.data);
        if (msg.event === 'postgres_changes' && msg.payload && msg.payload.data) {
          const change = msg.payload.data;
          const record = change.record || change.new;
          if (!record) return;
          if (change.type === 'UPDATE' && ART[record.id]) {
            // Only update if not currently editing this article
            if (editKey !== record.id) {
              Object.assign(ART[record.id], record);
              // Update in GROUPS too
              GROUPS.forEach(function(g) {
                g.articles.forEach(function(a, i) {
                  if (a.id === record.id) g.articles[i] = ART[record.id];
                });
              });
              render();
              setSyncStatus('ok', '\u21bb Aktualisiert: ' + (record.name || ''));
              setTimeout(function(){ setSyncStatus('ok', 'Echtzeit aktiv'); }, 2000);
            }
          }
        }
      } catch(err) { /* ignore parse errors */ }
    };

    ws.onclose = function() {
      setSyncStatus('error', 'Verbindung getrennt – verbinde...');
      retryTimeout = setTimeout(connect, 5000);
    };

    ws.onerror = function() {
      ws.close();
    };
  }

  connect();
}

function setMsg(m) { document.getElementById('loading-msg').textContent = m; }

function buildFromRows(rows) {
  ART = {};
  const groupMap = {};
  rows.forEach(function(r) {
    ART[r.id] = Object.assign({}, r);
    if (!groupMap[r.kategorie]) groupMap[r.kategorie] = [];
    groupMap[r.kategorie].push(r.id);
  });
  const order = RAW_DATA.groups.map(function(g) { return g.kategorie; });
  Object.keys(groupMap).forEach(function(k) { if (order.indexOf(k) < 0) order.push(k); });
  GROUPS = order.filter(function(k) { return groupMap[k]; }).map(function(k) {
    const arts = groupMap[k].map(function(id) { return ART[id]; }).filter(Boolean);
    arts.sort(function(a,b) { return a.name.localeCompare(b.name, 'de'); });
    return { kategorie: k, articles: arts };
  });
}

function switchView(v) {
  currentView = v;
  document.getElementById('view-table').style.display = v === 'table' ? 'block' : 'none';
  document.getElementById('view-dashboard').style.display = v === 'dashboard' ? 'block' : 'none';
  document.getElementById('btn-table').classList.toggle('active', v === 'table');
  document.getElementById('btn-dash').classList.toggle('active', v === 'dashboard');
  if (v === 'dashboard') renderDash(); else render();
}

function setStatus(s) {
  activeStatus = s;
  ['all','offen','definiert','gesperrt'].forEach(function(x) {
    const el = document.getElementById('fs-' + x);
    if (el) el.classList.toggle('active', x === s);
  });
  render();
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const fBio = document.getElementById('f-bio').checked;
  const fVegan = document.getElementById('f-vegan').checked;
  const fVeg = document.getElementById('f-veg').checked;
  const fGluten = document.getElementById('f-gluten').checked;
  const fPairs = document.getElementById('f-pairs').checked;
  const fNo2025 = document.getElementById('f-no2025').checked;
  return GROUPS.map(function(g) {
    return {
      kategorie: g.kategorie,
      articles: g.articles.filter(function(a) {
        const st = a.status || 'offen';
        if (activeStatus !== 'all' && st !== activeStatus) return false;
        if (fBio && a.bio_pflicht !== 'Ja') return false;
        if (fVegan && a.vegan_pflicht !== 'Ja') return false;
        if (fVeg && a.veg_pflicht !== 'Ja') return false;
        if (fGluten && a.glutenfrei_pflicht !== 'Ja') return false;
        if (fPairs && !(a.bio_pp && a.conv_pp)) return false;
        if (fNo2025 && a.kg_2025 != null && a.kg_2025 > 0) return false;
        if (q && a.name.toLowerCase().indexOf(q) < 0 && g.kategorie.toLowerCase().indexOf(q) < 0) return false;
        return true;
      })
    };
  });
}

    function p(x) { return n > 0 ? (x/n*100).toFixed(1) : 0; }
    return '<div class="prog-row">'
      + '<div class="prog-lbl"><span>'+g.kategorie+'</span><span style="color:#607080">'+def+' def. / '+ges+' gesperrt / '+off+' offen</span></div>'
      + '<div class="prog-bg"><div class="fill-def" style="width:'+p(def)+'%"></div>'
      + '<div class="fill-ges" style="width:'+p(ges)+'%"></div>'
      + '<div class="fill-off" style="width:'+p(off)+'%"></div></div></div>';
  }).join('');
}

function render() {
  const fg = getFiltered();
  let ta=0, match=0, tSpend=0;
  const cnt = {offen:0, definiert:0, gesperrt:0};
  fg.forEach(function(g) {
    g.articles.forEach(function(a) {
      ta++;
      if (a.kg_2025 != null) match++;
      tSpend += a.spend_2025 || 0;
      const s = a.status || 'offen';
      cnt[s] = (cnt[s]||0) + 1;
    });
  });
  document.getElementById('scards').innerHTML =
    '<div class="sc"><div class="lbl">Artikel</div><div class="val">'+ta+'</div><div class="sub">'+fg.filter(function(g){return g.articles.length>0;}).length+' Kategorien</div></div>' +
    '<div class="sc"><div class="lbl">Ausgaben 2025</div><div class="val">'+fmtE(tSpend)+'</div><div class="sub">gematchte</div></div>' +
    '<div class="sc" style="border-top:3px solid #ffc107"><div class="lbl">Offen</div><div class="val" style="color:#856404">'+cnt.offen+'</div></div>' +
    '<div class="sc" style="border-top:3px solid #28a745"><div class="lbl">Definiert</div><div class="val" style="color:#155724">'+cnt.definiert+'</div></div>' +
    '<div class="sc" style="border-top:3px solid #dc3545"><div class="lbl">Gesperrt</div><div class="val" style="color:#721c24">'+cnt.gesperrt+'</div></div>' +
    '<div class="sc"><div class="lbl">Mit Bestelldaten</div><div class="val">'+match+'</div><div class="sub">von '+ta+'</div></div>';

  const gc = document.getElementById('gc');
  gc.innerHTML = '';
  let vis = 0;
  fg.forEach(function(g) {
    if (!g.articles.length) return;
    vis += g.articles.length;
    const k = g.kategorie;
    const isOpen = openGroups[k] !== false;
    const arts = g.articles;
    const co = {offen:0, definiert:0, gesperrt:0};
    arts.forEach(function(a) { const s=a.status||'offen'; co[s]=(co[s]||0)+1; });
    const gSpend = arts.reduce(function(s,a){return s+(a.spend_2025||0);}, 0);
    const gKg = arts.reduce(function(s,a){return s+(a.kg_2025||0);}, 0);
    const pills = (co.definiert>0?'<span class="gp gp-d">'+co.definiert+' def.</span>':'')
      + (co.gesperrt>0?'<span class="gp gp-g">'+co.gesperrt+' gesperrt</span>':'')
      + (co.offen>0?'<span class="gp gp-o">'+co.offen+' offen</span>':'');

    const block = document.createElement('div');
    block.className = 'group-block';
    const bodyId = 'gbody_' + k.replace(/[^a-zA-Z0-9]/g,'_');
    block.innerHTML =
      '<div class="gh" data-kat="'+k.replace(/"/g,'&quot;')+'">'
      + '<span class="gt'+(isOpen?' open':'')+'">&#9654;</span>'
      + '<span class="gname">'+k+'</span>'
      + '<span class="gbadge">'+arts.length+'</span>'
      + '<div class="g-pills">'+pills+'</div>'
      + '<span class="gmeta">'+(gKg>0?fmt(gKg,0)+'\u00a0kg\u00a0\u00b7\u00a0':'')+(gSpend>0?fmtE(gSpend):'')+'</span>'
      + '</div>'
      + '<div class="gb'+(isOpen?' open':'')+'" id="'+bodyId+'">'
      + buildTable(k, arts)
      + '</div>';
    gc.appendChild(block);
  });
  document.getElementById('no-res').style.display = vis === 0 ? 'block' : 'none';
}

// Single click handler
document.addEventListener('click', function(e) {
  // Edit button
  const btn = e.target.closest('.edit-btn');
  if (btn) {
    e.stopPropagation();
    const id = btn.getAttribute('data-id');
    if (id) openEdit(id);
    return;
  }
  // Row checkbox
  const chk = e.target.closest('.art-chk');
  if (chk) {
    e.stopPropagation();
    const id = chk.getAttribute('data-id');
    if (!id) return;
    if (chk.checked) selectedIds.add(id); else selectedIds.delete(id);
    chk.closest('tr').classList.toggle('row-selected', chk.checked);
    updateSelBar();
    return;
  }
  // Select-all checkbox
  const grpChk = e.target.closest('.grp-chk');
  if (grpChk) {
    e.stopPropagation();
    // find all art-chk in same table
    const table = grpChk.closest('table');
    if (!table) return;
    const allChks = table.querySelectorAll('.art-chk');
    allChks.forEach(function(cb) {
      const id = cb.getAttribute('data-id');
      if (!id) return;
      cb.checked = grpChk.checked;
      if (grpChk.checked) selectedIds.add(id); else selectedIds.delete(id);
      cb.closest('tr').classList.toggle('row-selected', grpChk.checked);
    });
    updateSelBar();
    return;
  }
  // Group header toggle
  const gh = e.target.closest('.gh');
  if (gh) {
    const k = gh.getAttribute('data-kat');
    const gt = gh.querySelector('.gt');
    const gb = gh.nextElementSibling;
    if (!gb) return;
    const nowOpen = !gb.classList.contains('open');
    openGroups[k] = nowOpen;
    gt.classList.toggle('open', nowOpen);
    gb.classList.toggle('open', nowOpen);
  }
});

function buildTable(gname, articles) {
  const s = sortState[gname] || {col:'name', dir:1};
  const sorted = articles.slice().sort(function(a,b) {
    if (s.col === 'name') return s.dir * a.name.localeCompare(b.name, 'de');
    const av = a[s.col] != null ? a[s.col] : (s.dir < 0 ? -Infinity : Infinity);
    const bv = b[s.col] != null ? b[s.col] : (s.dir < 0 ? -Infinity : Infinity);
    return s.dir * (av - bv);
  });

  function th(col, lbl, cls) {
    const isSorted = s.col === col;
    const arr = isSorted ? (s.dir > 0 ? '&#9650;' : '&#9660;') : '';
    const gn = gname.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return '<th class="s'+(cls?' '+cls:'')+(isSorted?' sorted':'')+'" onclick="sortTbl(\''+gn+'\',\''+col+'\')">'+lbl+(arr?'<span class="sa">'+arr+'</span>':'')+'</th>';
  }

  function bpill(v) {
    if (!v || v === 'keine Vorgabe') return '<span class="pill nv">\u2013</span>';
    return v === 'Ja' ? '<span class="pill ja">Ja</span>' : '<span class="pill nein">Nein</span>';
  }

  const rows = sorted.map(function(a) {
    const st = a.status || 'offen';
    const rowCls = st === 'definiert' ? 'row-definiert' : st === 'gesperrt' ? 'row-gesperrt' : '';
    const pct = a.pct_bio_vs_conv;
    const pctH = pct != null ? '<span class="pct '+(pct>0?'pos':'neg')+'">'+(pct>0?'+':'')+pct+'%</span>' : '\u2013';
    const comment = a.bemerkungen ? ' <span title="'+String(a.bemerkungen).replace(/"/g,'&quot;')+'" style="cursor:help">&#x1F4AC;</span>' : '';
    const isSelected = selectedIds.has(a.id);
    return '<tr class="'+rowCls+(isSelected?' row-selected':'')+'">' + '<td class="chk-cell"><input type="checkbox" class="row-chk art-chk" data-id="'+a.id+'" '+(isSelected?'checked':'')+' ></td>'
      + '<td style="width:25%"><span class="art-name">'+a.name+'</span>'+comment+'</td>'
      + '<td style="width:7%" class="c"><span class="pill '+st+'">'+st+'</span></td>'
      + '<td style="width:4%" class="c">'+bpill(a.bio_pflicht)+'</td>'
      + '<td style="width:4%" class="c">'+bpill(a.vegan_pflicht)+'</td>'
      + '<td style="width:4%" class="c">'+bpill(a.veg_pflicht)+'</td>'
      + '<td style="width:4%" class="c">'+bpill(a.glutenfrei_pflicht)+'</td>'
      + '<td style="width:7%" class="r csep">'+(a.kg_2025!=null?fmt(a.kg_2025,0)+'\u00a0kg':'\u2013')+'</td>'
      + '<td style="width:8%" class="r">'+fmtE(a.spend_2025)+'</td>'
      + '<td style="width:7%" class="r csep">'+(a.conv_pp?fmtE(a.conv_pp,3)+'/kg':'\u2013')+'</td>'
      + '<td style="width:7%" class="r">'+(a.bio_pp?fmtE(a.bio_pp,3)+'/kg':'\u2013')+'</td>'
      + '<td style="width:8%" class="r">'+(a.all_conv?fmtE(a.all_conv):'\u2013')+'</td>'
      + '<td style="width:8%" class="r">'+(a.all_bio?fmtE(a.all_bio):'\u2013')+'</td>'
      + '<td style="width:5%" class="c">'+pctH+'</td>'
      + '<td style="width:5%" class="c"><button class="edit-btn" data-id="'+a.id+'">&#9998; Bearb.</button></td>'
      + '</tr>';
  }).join('');

  const gn = gname.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  return '<table><thead><tr>'
    + '<th class="chk-cell"><input type="checkbox" class="row-chk grp-chk" title="Alle" ></th>'
    + th('name','Artikel')
    + th('status','Status','c')
    + '<th class="c">Bio</th><th class="c">Vegan</th><th class="c">Veg.</th><th class="c">GF</th>'
    + '<th class="r csep">Menge 2025</th>'
    + th('spend_2025','Ausgaben','r')
    + '<th class="r csep">\u00d8 Konv./kg</th>'
    + '<th class="r">\u00d8 Bio/kg</th>'
    + '<th class="r">100% Konv.</th>'
    + '<th class="r">100% Bio</th>'
    + '<th class="c">Bio/Konv</th>'
    + '<th class="c">Aktion</th>'
    + '</tr></thead><tbody>'+rows+'</tbody></table>';
}

function toggleRowSelect(cb) {
  const id = cb.getAttribute('data-id');
  if (!id) return;
  if (cb.checked) selectedIds.add(id); else selectedIds.delete(id);
  cb.closest('tr').classList.toggle('row-selected', cb.checked);
  updateSelBar();
}

function toggleSelectAll(cb, arts) {
  arts.forEach(function(a) {
    if (cb.checked) selectedIds.add(a.id); else selectedIds.delete(a.id);
  });
  updateSelBar();
  render();
}

function updateSelBar() {
  const n = selectedIds.size;
  const bar = document.getElementById('sel-bar');
  bar.style.display = n > 0 ? 'flex' : 'none';
  document.getElementById('sel-info').innerHTML =
    '<strong>' + n + '</strong> Artikel ausgew&auml;hlt';
}

function clearSelection() {
  selectedIds.clear();
  updateSelBar();
  render();
}

async function bulkSetStatus(status) {
  if (selectedIds.size === 0) return;
  const ids = Array.from(selectedIds);
  const now = new Date().toISOString();
  // Update locally first
  ids.forEach(function(id) {
    if (ART[id]) { ART[id].status = status; ART[id].updated_at = now; }
  });
  render();
  setSyncStatus('saving', 'Speichert ' + ids.length + ' Artikel...');
  try {
    // Supabase: update in batch using IN filter
    const res = await fetch(SUPA_URL + '/rest/v1/produktvorgaben?id=in.(' + ids.join(',') + ')', {
      method: 'PATCH',
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + SUPA_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ status: status, updated_at: now })
    });
    if (!res.ok) throw new Error(await res.text());
    setSyncStatus('ok', ids.length + ' gespeichert \u2713');
    setTimeout(function(){ setSyncStatus('ok', 'Verbunden'); }, 2500);
  } catch(e) {
    setSyncStatus('error', 'Fehler beim Speichern');
    console.error(e);
  }
}

function sortTbl(gname, col) {
  const s = sortState[gname] || {col:'name', dir:1};
  sortState[gname] = s.col === col ? {col:col, dir:-s.dir} : {col:col, dir:-1};
  openGroups[gname] = true;
  render();
}

function openEdit(id) {
  editKey = id;
  const a = ART[id];
  if (!a) { console.error('Article not found:', id); return; }

  // Build artList from current filtered view
  const fg = getFiltered();
  artList = [];
  fg.forEach(function(g) { g.articles.forEach(function(x) { artList.push(x.id); }); });

  const idx = artList.indexOf(id);
  document.getElementById('m-nav').textContent = (idx+1) + ' von ' + artList.length;
  document.getElementById('m-title').textContent = a.name;

  // Stats panel
  const pct = a.pct_bio_vs_conv;
  const pctColor = pct == null ? '#607080' : pct > 0 ? '#a00' : '#1a6b1a';
  document.getElementById('m-stats').innerHTML =
    '<div class="stat-sect">Bestelldaten 2025</div>'
    + statBox('Jahresmenge', a.kg_2025!=null?fmt(a.kg_2025,0)+' kg':'\u2013')
    + statBox('Ausgaben 2025', fmtE(a.spend_2025))
    + '<div class="stat-sect" style="margin-top:12px">Bio vs. Konventionell</div>'
    + statBox('\u00d8 Konv./kg', a.conv_pp?fmtE(a.conv_pp,3):'\u2013')
    + statBox('\u00d8 Bio/kg', a.bio_pp?fmtE(a.bio_pp,3):'\u2013')
    + statBox('100% Konventionell', a.all_conv?fmtE(a.all_conv):'\u2013', a.all_conv!=null)
    + statBox('100% Bio', a.all_bio?fmtE(a.all_bio):'\u2013', a.all_bio!=null)
    + (pct!=null ? '<div class="pct-big" style="color:'+pctColor+'">'+(pct>0?'+':'')+pct+'%<div class="pct-lbl">Bio vs. Konv.</div></div>' : '')
    + '<div class="stat-id">Necta ID: '+(a.necta_id||'\u2013')+'</div>';

  // Form fields
  function setf(id, val) { const el=document.getElementById(id); if(el) el.value=(!val||val==='None'||val==='null')?'':val; }
  document.getElementById('e-status').value = a.status || 'offen';
  document.getElementById('e-kiosk').value = a.kiosk || 'Nein';
  document.getElementById('e-bio').value = a.bio_pflicht || 'keine Vorgabe';
  document.getElementById('e-vegan').value = a.vegan_pflicht || 'keine Vorgabe';
  document.getElementById('e-veg').value = a.veg_pflicht || 'keine Vorgabe';
  document.getElementById('e-gluten').value = a.glutenfrei_pflicht || 'keine Vorgabe';
  setf('e-mhd', a.mhd); setf('e-groesse', a.groesse);
  setf('e-verpackung', a.verpackung); setf('e-zert', a.zertifizierung);
  setf('e-herkunft', a.herkunft); setf('e-bev', a.bevorzugt);
  setf('e-aus', a.ausschluss); setf('e-bem', a.bemerkungen);

  document.getElementById('mbg').classList.add('open');
}

function statBox(lbl, val, highlight) {
  return '<div class="stat-box'+(highlight?' highlight':'')+'">'
    + '<div class="sb-lbl">'+lbl+'</div>'
    + '<div class="sb-val">'+val+'</div>'
    + '</div>';
}

async function saveModal() {
  if (!editKey) return;
  const a = ART[editKey];
  function gv(id) { const el=document.getElementById(id); return el&&el.value.trim()||null; }
  const updates = {
    status: document.getElementById('e-status').value,
    kiosk: document.getElementById('e-kiosk').value,
    bio_pflicht: document.getElementById('e-bio').value,
    vegan_pflicht: document.getElementById('e-vegan').value,
    veg_pflicht: document.getElementById('e-veg').value,
    glutenfrei_pflicht: document.getElementById('e-gluten').value,
    mhd: gv('e-mhd'), groesse: gv('e-groesse'),
    verpackung: gv('e-verpackung'), zertifizierung: gv('e-zert'),
    herkunft: gv('e-herkunft'), bevorzugt: gv('e-bev'),
    ausschluss: gv('e-aus'), bemerkungen: gv('e-bem'),
    updated_at: new Date().toISOString()
  };
  Object.assign(a, updates);
  closeModal();
  render();
  setSyncStatus('saving', 'Speichert...');
  try {
    await dbUpdate(a.id, updates);
    setSyncStatus('ok', 'Gespeichert \u2713');
    setTimeout(function(){ setSyncStatus('ok', 'Verbunden'); }, 2500);
  } catch(e) {
    setSyncStatus('error', 'Fehler');
    console.error(e);
  }
}

async function saveAndNext() {
  const curId = editKey;
  const curIdx = artList.indexOf(curId);
  await saveModal();
  if (curIdx >= 0 && curIdx + 1 < artList.length) {
    const nextId = artList[curIdx + 1];
    if (ART[nextId]) setTimeout(function(){ openEdit(nextId); }, 250);
  }
}

function closeModal() {
  document.getElementById('mbg').classList.remove('open');
  editKey = null;
}

function exportExcel() {
  if (typeof XLSX === 'undefined') { alert('Bitte kurz warten...'); return; }
  const headers = ['Kategorie','Grundprodukt','Necta ID','Warengruppe','Kiosk',
    'Status','Bio Pflicht','Vegan Pflicht','Vegetarisch Pflicht','Glutenfrei Pflicht',
    'Mindest-MHD','Zertifizierung','Gew./Gr\u00f6\u00dfenvorgabe','Verpackung',
    'Ausschluss Hersteller','Bevorzugter Hersteller','Regionale Herkunft','Bemerkungen',
    'Menge 2025 (kg)','Ausgaben 2025 (\u20ac)','\u00d8 Konv./kg','\u00d8 Bio/kg',
    '100% Konv.','100% Bio','Bio vs. Konv. (%)','Zuletzt ge\u00e4ndert'];
  const rows = [headers];
  GROUPS.forEach(function(g) {
    g.articles.forEach(function(a) {
      rows.push([
        a.kategorie, a.name, a.necta_id||'', a.warengruppe||'', a.kiosk||'',
        a.status||'offen', a.bio_pflicht||'', a.vegan_pflicht||'', a.veg_pflicht||'', a.glutenfrei_pflicht||'',
        a.mhd||'', a.zertifizierung||'', a.groesse||'', a.verpackung||'',
        a.ausschluss||'', a.bevorzugt||'', a.herkunft||'', a.bemerkungen||'',
        a.kg_2025!=null?a.kg_2025:'', a.spend_2025!=null?a.spend_2025:'',
        a.conv_pp!=null?a.conv_pp:'', a.bio_pp!=null?a.bio_pp:'',
        a.all_conv!=null?a.all_conv:'', a.all_bio!=null?a.all_bio:'',
        a.pct_bio_vs_conv!=null?a.pct_bio_vs_conv:'',
        a.updated_at?new Date(a.updated_at).toLocaleString('de-DE'):''
      ]);
    });
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [20,35,12,20,8,10,10,10,12,12,8,18,18,18,18,18,16,30,12,14,10,10,12,12,10,18].map(function(w){return {wch:w};});
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Produktvorgaben');
  XLSX.writeFile(wb, 'Produktvorgaben_Export.xlsx');
}

init();

</script>
